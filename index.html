<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>あじfly!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="toastContainer"></div>

    <div id="uiOverlay">
        <div id="jetpackGaugeContainer" class="hidden">
            <div id="jetpackGaugeLabel">JETPACK READY: <span id="gaugePercent">0</span>%</div>
            <div class="gauge-bar-bg">
                <div id="jetpackGaugeBar"></div>
            </div>
        </div>

        <div id="titleScreen" class="screen">
            <button id="ruleOpenBtn" class="btn-sub">ルール</button>
            <button id="historyOpenBtn" class="btn-sub" style="right: auto; left: 10px;">アプデ履歴</button>
            <button id="muteBtn" class="btn-sub" style="right: auto; left: 10px; margin-left: 80px;">🔊</button>
            <h1>あじfly!</h1>
            <div id="titleStats">所持: <span id="titleCoin">0</span> コイン</div>
            
            <div class="menu-buttons">
                <button id="toModeEndlessBtn" class="btn">エンドレス</button>
                <button id="toModeChallengeBtn" class="btn btn-blue">チャレンジ</button>
                <button id="shopOpenBtn" class="btn btn-orange">ショップ</button>
                <button id="achieveOpenBtn" class="btn btn-purple">実績一覧</button>
            </div>
        </div>

        <div id="endlessScreen" class="screen hidden">
            <h2>エンドレス 難易度選択</h2>
            <div class="level-select">
                <button class="btn lvl-btn" data-lvl="1">☆1</button>
                <button class="btn lvl-btn" data-lvl="2">☆☆2</button>
                <button class="btn lvl-btn" data-lvl="3">☆☆☆3</button>
            </div>
            <button class="btn btn-gray backToTitleBtn">もどる</button>
        </div>

        <div id="challengeScreen" class="screen hidden">
            <h2>チャレンジモード</h2>
            <div id="challengeList" class="list-container"></div>
            <button class="btn btn-gray backToTitleBtn">もどる</button>
        </div>

        <div id="shopScreen" class="screen hidden">
            <h2>スキンショップ</h2>
            <div style="font-weight: bold; margin-bottom: 5px;">所持: <span id="shopCoin">0</span> コイン</div>
            <div id="shopList" class="list-container"></div>
            <button class="btn btn-gray backToTitleBtn">もどる</button>
        </div>

        <div id="achieveScreen" class="screen hidden">
            <h2>実績一覧</h2>
            <div id="achieveList" class="list-container"></div>
            <button class="btn btn-gray backToTitleBtn">もどる</button>
        </div>

        <div id="historyScreen" class="screen hidden">
            <h2>アップデート履歴</h2>
            <div id="historyList" class="list-container"></div>
            <button id="historyCloseBtn" class="btn btn-gray">とじる</button>
        </div>

        <div id="ruleScreen" class="screen hidden">
            <h2>ルール説明</h2>
            <div class="rule-text">
                <p>・タップやクリックでジャンプして食べられないように避けろ！</p>
                <p>・☆☆2、☆☆☆3からは2段ジャンプができるよ！</p>
                <p>・下のゲージが溜まると、長押しでジェットパックが使える！</p>
                <p class="rule-warn">※たまにクリアできない障害物が出てくるけどごめんね！</p>
            </div>
            <button id="ruleCloseBtn" class="btn btn-blue">とじる</button>
        </div>

        <div id="gameOverScreen" class="screen hidden">
            <h1>GAME OVER</h1>
            <div class="final-scores">
                <p>SCORE <span id="finalScore">0</span></p>
                <p>BEST <span id="finalBest">0</span></p>
                <p style="color: #ff9800; margin-top: 5px;">GET COIN +<span id="getGold">0</span></p>
            </div>
            <div class="go-buttons">
                <button id="playAgainButton" class="btn">PLAY AGAIN</button>
                <button id="toTitleButton" class="btn btn-blue">TITLE</button>
            </div>
        </div>

        <div id="missionClearScreen" class="screen hidden">
            <h1 style="color: #4caf50;">MISSION CLEAR!</h1>
            <div class="final-scores">
                <p id="clearMissionName" style="font-size: 22px; color: #333;"></p>
                <p style="color: #ff9800; margin-top: 5px;">GET COIN +<span id="clearGetGold"></span></p>
            </div>
            <div class="go-buttons">
                <button id="clearToTitleButton" class="btn btn-blue">TITLE</button>
            </div>
        </div>
    </div>

    <script src="version.js"></script>
    <script src="save.js"></script>
    <script src="level.js"></script>
    <script src="shop.js"></script>
    <script src="achievements.js"></script>
    <script src="challenge.js"></script>
    <script src="state.js"></script>
    <script src="audio.js"></script>
    <script src="input.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
